name: Build NextBSD Kernel
on:
  repository_dispatch:
    types: [toolchain-updated]
  push:
    paths: ['patches/**', 'config/**', 'src-overlay/**', '.github/workflows/build.yml']
  pull_request:
    # Validate the kernel build on PRs touching patches/config/workflow. PR
    # runs never cascade — the module-build trigger is gated on
    # github.event_name == 'repository_dispatch', which a pull_request is not.
    paths: ['patches/**', 'config/**', 'src-overlay/**', '.github/workflows/build.yml']
  workflow_dispatch:

env:
  FREEBSD_BRANCH: releng/15.1

jobs:
  kernel:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: amd64
            target_arch: amd64
          - target: arm64
            target_arch: aarch64
    container:
      # Per-arch toolchain image. repository_dispatch carries fbsd_sha (the
      # pinned source commit) -> :<arch>-fbsd-<sha>; a patch-only push or manual
      # run has no sha and falls back to :<arch>-latest. Both arches cross-build
      # on the x86_64 runner (clang cross-compiles; no emulation).
      image: ghcr.io/nextbsd-redux/nextbsd-kernel-toolchain:${{ matrix.target }}-${{ github.event.client_payload.fbsd_sha && format('fbsd-{0}', github.event.client_payload.fbsd_sha) || 'latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Apply patches
        run: |
          cd /usr/src
          for p in $(cat "$GITHUB_WORKSPACE/patches/series"); do
            echo "Applying $p"
            git apply "$GITHUB_WORKSPACE/patches/$p"
          done

      - name: Rebrand kernel identity (NextBSD)
        # Done with sed keyed on the stable variable NAMES, NOT a git-apply
        # patch: a regex per line is immune to version-string bumps
        # (15.0->15.1, p10->p11) and surrounding-code restructuring, whereas
        # git apply needs matching context and broke on the p9->p10 bump.
        #
        # IMPORTANT: REVISION is left STOCK. The build derives the compiler
        # target triple (x86_64-unknown-freebsd${OS_REVISION}) from REVISION,
        # and that sets __FreeBSD__. A timestamp in REVISION poisons __FreeBSD__
        # kernel-wide (e.g. smartpqi assigns it to a u_char -> -Werror). So the
        # timestamp goes in RELEASE only (= osrelease / uname -r); REVISION
        # stays 15.0 so __FreeBSD__ stays 15. Each sed line is self-contained
        # because the version-extraction machinery evaluates these lines in
        # isolation. date -u +FMT and date -u are GNU+BSD portable.
        run: |
          cd /usr/src
          nv=sys/conf/newvers.sh
          # Also reformat the version banner (VERINFO/VERSTR, both metadata
          # branches) to a clean NextBSD string and drop the FreeBSD bits that
          # don't fit out-of-tree: the #N build counter and the
          # <hash>[-dirty] VCS tag (the tree is always "dirty" -- it's
          # releng/15.1 + the NextBSD patch stack). Result (uname -v):
          #   NextBSD Kernel Version <RELEASE>; <date>; <user>@<host>:<objdir>
          # RELEASE (the build timestamp) leads, so nextbsd-version -k can still
          # find it. Replaced lines are tab-indented inside an if/else; both
          # branches get the same value, which is fine.
          sed -i \
            -e 's~^TYPE=.*~TYPE="NextBSD"~' \
            -e 's~^RELEASE=.*~RELEASE=$(date -u +%Y%m%d-%H%M%S)~' \
            -e 's~t=$(date)$~t=$(date -u)~' \
            -e 's~^[[:space:]]*VERINFO=".*~VERINFO="${TYPE} Kernel Version ${RELEASE}; ${t}; ${u}@${h}:${d}"~' \
            -e 's~^[[:space:]]*VERSTR=".*~VERSTR="${VERINFO}\\\\n"~' \
            "$nv"
          echo "=== newvers.sh identity after rebrand ==="
          grep -nE '^TYPE=|^RELEASE=|t=\$\(date|VERINFO=|VERSTR=' "$nv" || true

      # A syscalls.master patch changes the GENERATED syscall tables
      # (init_sysent.c, sys/sys/syscall.h, sysproto.h, syscalls.c, ...).
      # buildkernel compiles the committed generated files and does NOT
      # regenerate them, so run the `sysent` target in the build env (where
      # flua from the baked kernel-toolchain is on PATH) to regenerate them in
      # the runner's /usr/src before building. No generated source is ever
      # committed to this repo — it carries patches only. Idempotent when no
      # patch touches syscalls.master.
      - name: Regenerate syscall tables (sysent)
        run: |
          cd /usr/src
          ./tools/build/make.py \
            --cross-bindir="${CROSS_BINDIR}" \
            TARGET="${{ matrix.target }}" \
            TARGET_ARCH="${{ matrix.target_arch }}" \
            buildenv BUILDENV_SHELL='make -C sys/kern sysent'

      - name: Copy kernel config
        run: cp "$GITHUB_WORKSPACE/config/NEXTBSD" /usr/src/sys/${{ matrix.target }}/conf/

      # Build the out-of-tree Mach module INTO the kernel (options COMPAT_MACH,
      # nextbsd#181). The mach sources are NextBSD-original (not freebsd-src),
      # carried in src-overlay/ and laid into the throwaway clone here — the
      # fork is never touched. The COMPAT_MACH wiring is done here, NOT in
      # patches/series, on purpose: the modules build shares the series and
      # must never see COMPAT_MACH (it would choke config with the source
      # absent). config/NEXTBSD in the repo stays clean for the same reason.
      - name: Build mach into the kernel (overlay + COMPAT_MACH wiring)
        run: |
          set -eu
          cp -R "$GITHUB_WORKSPACE/src-overlay/sys/." /usr/src/sys/
          # kern_event.c's knote_enqueue() is static; the kmod resolved it via
          # the runtime kld symtab (which includes locals), but the in-kernel
          # static link can't. Append a global wrapper in kern_event.c's own TU
          # (it can call the static fn); ipc_pset.c calls mach_knote_enqueue.
          printf '\n/* nextbsd#181: global wrapper so compat/mach can reach the static knote_enqueue */\nvoid mach_knote_enqueue(struct knote *kn);\nvoid mach_knote_enqueue(struct knote *kn) { knote_enqueue(kn); }\n' >> /usr/src/sys/kern/kern_event.c
          grep -q '^COMPAT_MACH[[:space:]]' /usr/src/sys/conf/options || \
            printf 'COMPAT_MACH\topt_compat_mach.h\n' >> /usr/src/sys/conf/options
          cat "$GITHUB_WORKSPACE/src-overlay/conf/files.compat_mach" >> /usr/src/sys/conf/files
          # COMPAT_MACH_C: extra flags for compat/mach/*.c. -Wno-error mirrors
          # the out-of-tree kmod's WERROR= (the in-kernel build defaults to
          # -Werror); -DCOMPAT_MACH is omitted (opt_compat_mach.h provides it).
          # $S stays literal (single quotes) — it expands in the kernel Makefile.
          printf '\n# mach compat subsystem (options COMPAT_MACH, nextbsd#181)\n' >> /usr/src/sys/conf/kern.pre.mk
          printf 'COMPAT_MACH_C= -DMACH_INTERNAL= -DAUDIT -I$S/apple -include $S/compat/mach/compat_shim.h -Wno-error\n' >> /usr/src/sys/conf/kern.pre.mk
          grep -q '^options[[:space:]]*COMPAT_MACH' \
            /usr/src/sys/${{ matrix.target }}/conf/NEXTBSD || \
            printf 'options\tCOMPAT_MACH\n' >> /usr/src/sys/${{ matrix.target }}/conf/NEXTBSD
          echo "==> mach wired in; compat/mach .c files: $(grep -c 'optional compat_mach' /usr/src/sys/conf/files)"

      # In-kernel IOKit catalogue (K2, nextbsd#215). iokit_catalogue.c +
      # sys/iocatalogue.h are laid into /usr/src/sys by the overlay cp above;
      # here we just append its files fragment to the kernel source list. It is
      # `standard` (always compiled) and needs no option/config line. Wired here
      # (not in patches/series) for the same reason as mach: the modules build
      # shares the series but does not lay in the overlay, so it must never see
      # this source listed in sys/conf/files.
      - name: Wire in-kernel IOKit catalogue (K2, #215)
        run: |
          set -eu
          cat "$GITHUB_WORKSPACE/src-overlay/conf/files.iocatalogue" >> /usr/src/sys/conf/files
          test -f /usr/src/sys/dev/iokit/iokit_catalogue.c
          test -f /usr/src/sys/sys/iocatalogue.h
          echo "==> iocatalogue wired: $(grep -c 'dev/iokit/iokit_catalogue.c' /usr/src/sys/conf/files) entry; source + header present"

      # In-kernel IORegistry (K1, nextbsd#214). iokit_registry.c +
      # sys/ioregistry.h are laid into /usr/src/sys by the overlay cp above; here
      # we append its files fragment to the kernel source list. It is `standard`
      # (always compiled) and needs no option/config line. Wired here (not in
      # patches/series) for the same reason as the catalogue: the modules build
      # shares the series but does not lay in the overlay, so it must never see
      # this source listed in sys/conf/files. It hangs hw.iokit.registry off the
      # shared hw.iokit node defined (now non-static) by iokit_catalogue.c.
      - name: Wire in-kernel IORegistry (K1, #214)
        run: |
          set -eu
          cat "$GITHUB_WORKSPACE/src-overlay/conf/files.ioregistry" >> /usr/src/sys/conf/files
          test -f /usr/src/sys/dev/iokit/iokit_registry.c
          test -f /usr/src/sys/sys/ioregistry.h
          echo "==> ioregistry wired: $(grep -c 'dev/iokit/iokit_registry.c' /usr/src/sys/conf/files) entry; source + header present"

      # Bake linuxkpi_video into the kernel (graphics autoload, #64). drm.ko
      # (IOGraphics.kext) hard-MODULE_DEPENDs on linuxkpi_video -- drm-kmod's
      # video helpers (drm_aperture/HDMI/cmdline) -- which FreeBSD ships module-
      # only with no config option (no in-tree consumer). NextBSD ships no
      # /boot/kernel .ko tree, so we compile its sources in here, gated on
      # COMPAT_LINUXKPI. The source files are stock base sources (already in the
      # clone); we only append the files fragment. KERNEL build only -- the
      # modules build shares patches/series but does not lay the overlay or cat
      # these fragments, so it keeps building linuxkpi_video as its own .ko (same
      # rule as iocatalogue/ioregistry). iic + lindebugfs, drm's other two
      # missing base deps, are baked via config/NEXTBSD (device iic + LINDEBUGFS).
      - name: Wire in linuxkpi_video (drm dep; graphics autoload, #64)
        run: |
          set -eu
          cat "$GITHUB_WORKSPACE/src-overlay/conf/files.linuxkpi_video" >> /usr/src/sys/conf/files
          for s in linux_hdmi linux_aperture linux_cmdline linuxkpi_videokmod; do
            test -f "/usr/src/sys/compat/linuxkpi/common/src/$s.c"
          done
          echo "==> linuxkpi_video wired: $(grep -c 'linuxkpi_videokmod.c' /usr/src/sys/conf/files) entry; sources present"

      # vfs.pivot primitive (live-root, #70). kern/vfs_pivot.c is laid into
      # /usr/src/sys by the overlay cp above; append its files fragment so it
      # compiles into the kernel. It self-registers a `sysctl vfs.pivot` (no base
      # patch) and is inert until written. KERNEL build only -- same rule as the
      # iocatalogue/ioregistry/linuxkpi_video wiring above.
      - name: Wire in vfs.pivot primitive (live-root, #70)
        run: |
          set -eu
          cat "$GITHUB_WORKSPACE/src-overlay/conf/files.vfs_pivot" >> /usr/src/sys/conf/files
          test -f /usr/src/sys/kern/vfs_pivot.c
          echo "==> vfs.pivot wired: $(grep -c 'kern/vfs_pivot.c' /usr/src/sys/conf/files) entry; source present"

      - name: Build kernel (no modules)
        run: |
          cd /usr/src
          # --cross-bindir points at the external Clang 19 cross toolchain
          # (CROSS_BINDIR), inherited from the toolchain image ENV.
          ./tools/build/make.py \
            --cross-bindir="${CROSS_BINDIR}" \
            TARGET="${{ matrix.target }}" \
            TARGET_ARCH="${{ matrix.target_arch }}" \
            KERNCONF=NEXTBSD \
            NO_MODULES=yes \
            buildkernel -j"$(nproc)"

      # Tar the obj tree IN-CONTAINER, where /usr/obj perms are intact. The
      # exec bit (bmake, cross-tools) survives inside the tar stream; a raw
      # upload-artifact tree comes back 0644 and breaks make.py's bmake
      # bootstrap downstream (PermissionError on /usr/obj/bmake-install/bin/bmake).
      - name: Package obj tree (preserves exec bits)
        run: |
          # Full /usr/obj — consumed by nextbsd-kernel-modules.
          tar -czf "/tmp/kernel-obj-${{ matrix.target }}.tar.gz" -C /usr/obj .
          # sys/NEXTBSD subtree (kernel binary + opt_*.h) — consumed by nextbsd.
          SUB=$(cd /usr/obj && find . -type d -path '*sys/NEXTBSD' | head -1)
          echo "sys/NEXTBSD subtree: ${SUB:-<not found>}"
          test -n "$SUB"
          tar -czf "/tmp/nextbsd-kernel-${{ matrix.target }}.tar.gz" -C /usr/obj "$SUB"
          ls -lh /tmp/kernel-obj-${{ matrix.target }}.tar.gz /tmp/nextbsd-kernel-${{ matrix.target }}.tar.gz

      # Artifacts are now single .tar.gz files (already gzip'd → store-only).
      # Their CONTENTS carry the perms, so the round-trip through artifacts +
      # the continuous release no longer strips the exec bit.
      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextbsd-kernel-${{ matrix.target }}
          path: /tmp/nextbsd-kernel-${{ matrix.target }}.tar.gz
          compression-level: 0

      - name: Upload obj tree for modules
        uses: actions/upload-artifact@v4
        with:
          name: kernel-obj-${{ matrix.target }}
          path: /tmp/kernel-obj-${{ matrix.target }}.tar.gz
          compression-level: 0

      # --- Native image assembly (nextbsd#369) ---
      # Assemble a bootable disk.img HERE, in the toolchain container (which has
      # /usr/src + $CROSS_BINDIR to host-build makefs/mkimg), from THIS build's
      # kernel + the component `continuous` artifacts — exactly like
      # nextbsd-userland does. This replaces the old "download the published ISO
      # and inject the kernel in a FreeBSD VM" path, so the kernel CI no longer
      # depends on the ISO (which depends on nextbsd-pkg). The image is uploaded
      # for the separate KVM boot job. amd64 only for now (no arm64 boot job).
      - name: Assemble disk.img (this kernel + component continuous artifacts)
        if: github.event_name == 'pull_request' && matrix.target == 'amd64'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          ARCH: ${{ matrix.target }}
          KERNEL_TGZ: /tmp/nextbsd-kernel-${{ matrix.target }}.tar.gz
          WORK: ${{ github.workspace }}/nbimg
        run: |
          set -eu
          mkdir -p art
          # base rootfs (compat), the Darwin userland layer, and driver kexts —
          # each from its own `continuous` release; the kernel is THIS build's.
          gh release download continuous -R nextbsd-redux/nextbsd-freebsd-compat \
            --pattern 'nextbsd-base-${{ matrix.target }}.tar.gz' --dir art --clobber
          gh release download continuous -R nextbsd-redux/nextbsd-userland \
            --pattern 'nextbsd-userland-${{ matrix.target }}.tar.gz' --dir art --clobber
          gh release download continuous -R nextbsd-redux/nextbsd-kernel-modules \
            --pattern '*kext*.tar.gz' --dir art --clobber || true
          export BASE_TGZ="$PWD/art/nextbsd-base-${{ matrix.target }}.tar.gz"
          export USERLAND_TGZ="$PWD/art/nextbsd-userland-${{ matrix.target }}.tar.gz"
          export MODULES_TGZ="$(ls art/*kext*.tar.gz 2>/dev/null | tr '\n' ' ')"
          # pkg-free /etc seed from nextbsd-overlays (no git in container), same
          # as nextbsd-userland's assembly step.
          gh api repos/nextbsd-redux/nextbsd-overlays/tarball/main > /tmp/overlays.tar.gz
          mkdir -p "$WORK/seed"
          tar -C "$WORK/seed" --strip-components=1 -xzf /tmp/overlays.tar.gz
          export SEED_ROOTFS="$WORK/seed/rootfs"
          chmod +x ci/assemble-image.sh
          ./ci/assemble-image.sh

      - name: Upload native-assembled image
        if: github.event_name == 'pull_request' && matrix.target == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: nextbsd-ci-image-${{ matrix.target }}
          path: nbimg/out/disk.img

  # PR-only boot smoke test: boot the disk.img the build job self-assembled from
  # THIS kernel + the component `continuous` artifacts (nextbsd#369). No ISO, no
  # nextbsd-pkg, no FreeBSD VM — the kernel CI holds its own, the way
  # nextbsd-userland does. The trap/Mach code under test compiles INTO the base
  # kernel (options COMPAT_MACH), so the freshly-built kernel in this image
  # carries it.
  #
  # Deliberately scoped: runs ONLY on pull_request, never on main/dispatch, and
  # does NOT gate `publish` or the downstream cascade. amd64 only (no arm64 boot
  # job yet).
  smoke-test:
    name: smoke-test (boot the self-assembled image with this kernel)
    needs: kernel
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      # The image (~2G raw) + qemu need headroom.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      # The bootable image the build job self-assembled from THIS kernel + the
      # component `continuous` artifacts. No ISO, no FreeBSD VM, no kernel
      # injection — the freshly-built kernel is already the one in the image.
      - name: Download the self-assembled image
        uses: actions/download-artifact@v4
        with:
          name: nextbsd-ci-image-amd64
          path: .

      - name: Install qemu + expect + OVMF
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 expect ovmf

      # Reuse nextbsd's canonical boot test (the on-image /usr/tests/.../run.sh
      # marker suite drives the actual assertions). Fetched from nextbsd main to
      # stay in sync (now carries the un-mute/trace-gate/teardown fixes, #375).
      # TODO(#376): pull this from the shared tests repo once it exists.
      - name: Fetch nextbsd boot test
        run: |
          mkdir -p tests
          curl -fsSL https://raw.githubusercontent.com/nextbsd-redux/nextbsd/main/tests/boot-test.sh \
            -o tests/boot-test.sh
          chmod +x tests/boot-test.sh

      - name: Boot test (this kernel, self-assembled image)
        run: ./tests/boot-test.sh disk.img

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log
          path: tests/boot.log
          if-no-files-found: ignore

  # Refresh the rolling `continuous` release from a successful main build, so
  # downstream consumers ingest a stable, always-present pointer instead of
  # scraping "latest successful main run" artifacts (which expire and aren't
  # gated). PRs build (the job above) but never reach here — see the `if`.
  # Single non-matrix job (not a per-arch step) so the two legs don't race on
  # release creation; it collects both arches' artifacts and publishes once.
  publish:
    name: publish continuous
    needs: kernel
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # The build job already produced perms-correct .tar.gz files (one per
      # artifact); just gather them. No re-tar — re-taring the extracted tree
      # is exactly what stripped the exec bit before.
      - name: Collect per-arch assets
        run: |
          mkdir -p out
          find artifacts -name 'kernel-obj-*.tar.gz' -exec cp {} out/ \;
          find artifacts -name 'nextbsd-kernel-*.tar.gz' -exec cp {} out/ \;
          ls -lh out/

      # Stable asset names (no datestamp) → each publish overwrites in place, so
      # the release never accumulates stale assets and needs no delete step.
      - name: Publish to continuous release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous kernel build
          body: |
            Rolling kernel build, refreshed on every successful `main` build.
            Consumed by nextbsd-kernel-modules (`kernel-obj-<arch>.tar.gz`) and
            nextbsd (`nextbsd-kernel-<arch>.tar.gz`).

            Build log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit: ${{ github.sha }}
          prerelease: true
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: |
            out/*.tar.gz

      # Cascade to modules only on a real source/toolchain change
      # (repository_dispatch), and only AFTER continuous is refreshed above —
      # so the module build ingests this run's obj tree, not the prior one.
      # No run_id needed anymore: modules pulls kernel's continuous release.
      - name: Trigger module build
        if: github.event_name == 'repository_dispatch'
        run: |
          gh api repos/nextbsd-redux/nextbsd-kernel-modules/dispatches \
            -f event_type=kernel-updated \
            -f "client_payload[fbsd_sha]=${{ github.event.client_payload.fbsd_sha }}" \
            -f "client_payload[sha]=${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
