name: Build NextBSD Kernel
on:
  repository_dispatch:
    types: [toolchain-updated]
  push:
    paths: ['patches/**', 'config/**', 'src-overlay/**', '.github/workflows/build.yml']
  pull_request:
    # Validate the kernel build on PRs touching patches/config/workflow. PR
    # runs never cascade — the module-build trigger is gated on
    # github.event_name == 'repository_dispatch', which a pull_request is not.
    paths: ['patches/**', 'config/**', 'src-overlay/**', '.github/workflows/build.yml']
  workflow_dispatch:

env:
  FREEBSD_BRANCH: releng/15.0

jobs:
  kernel:
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: amd64
            target_arch: amd64
          - target: arm64
            target_arch: aarch64
    container:
      # Per-arch toolchain image. repository_dispatch carries fbsd_sha (the
      # pinned source commit) -> :<arch>-fbsd-<sha>; a patch-only push or manual
      # run has no sha and falls back to :<arch>-latest. Both arches cross-build
      # on the x86_64 runner (clang cross-compiles; no emulation).
      image: ghcr.io/nextbsd-redux/nextbsd-kernel-toolchain:${{ matrix.target }}-${{ github.event.client_payload.fbsd_sha && format('fbsd-{0}', github.event.client_payload.fbsd_sha) || 'latest' }}
    steps:
      - uses: actions/checkout@v4

      # ccache: persist CCACHE_DIR across runs so an unchanged/1-file rebuild
      # hits the cache. ccache itself is in the toolchain image; we point
      # --cross-bindir at the image's CCACHE_CROSS_BINDIR wrapper below.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-kernel-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            ccache-kernel-${{ matrix.target }}-

      - name: ccache reset counters
        run: |
          ccache -o max_size=3G
          ccache -z
          ccache -s

      - name: Apply patches
        run: |
          cd /usr/src
          for p in $(cat "$GITHUB_WORKSPACE/patches/series"); do
            echo "Applying $p"
            git apply "$GITHUB_WORKSPACE/patches/$p"
          done

      # A syscalls.master patch changes the GENERATED syscall tables
      # (init_sysent.c, sys/sys/syscall.h, sysproto.h, syscalls.c, ...).
      # buildkernel compiles the committed generated files and does NOT
      # regenerate them, so run the `sysent` target in the build env (where
      # flua from the baked kernel-toolchain is on PATH) to regenerate them in
      # the runner's /usr/src before building. No generated source is ever
      # committed to this repo — it carries patches only. Idempotent when no
      # patch touches syscalls.master.
      - name: Regenerate syscall tables (sysent)
        run: |
          cd /usr/src
          ./tools/build/make.py \
            --cross-bindir="${CCACHE_CROSS_BINDIR}" \
            TARGET="${{ matrix.target }}" \
            TARGET_ARCH="${{ matrix.target_arch }}" \
            buildenv BUILDENV_SHELL='make -C sys/kern sysent'

      - name: Copy kernel config
        run: cp "$GITHUB_WORKSPACE/config/NEXTBSD" /usr/src/sys/${{ matrix.target }}/conf/

      # Build the out-of-tree Mach module INTO the kernel (options COMPAT_MACH,
      # nextbsd#181). The mach sources are NextBSD-original (not freebsd-src),
      # carried in src-overlay/ and laid into the throwaway clone here — the
      # fork is never touched. The COMPAT_MACH wiring is done here, NOT in
      # patches/series, on purpose: the modules build shares the series and
      # must never see COMPAT_MACH (it would choke config with the source
      # absent). config/NEXTBSD in the repo stays clean for the same reason.
      - name: Build mach into the kernel (overlay + COMPAT_MACH wiring)
        run: |
          set -eu
          cp -R "$GITHUB_WORKSPACE/src-overlay/sys/." /usr/src/sys/
          # kern_event.c's knote_enqueue() is static; the kmod resolved it via
          # the runtime kld symtab (which includes locals), but the in-kernel
          # static link can't. Append a global wrapper in kern_event.c's own TU
          # (it can call the static fn); ipc_pset.c calls mach_knote_enqueue.
          printf '\n/* nextbsd#181: global wrapper so compat/mach can reach the static knote_enqueue */\nvoid mach_knote_enqueue(struct knote *kn);\nvoid mach_knote_enqueue(struct knote *kn) { knote_enqueue(kn); }\n' >> /usr/src/sys/kern/kern_event.c
          grep -q '^COMPAT_MACH[[:space:]]' /usr/src/sys/conf/options || \
            printf 'COMPAT_MACH\topt_compat_mach.h\n' >> /usr/src/sys/conf/options
          cat "$GITHUB_WORKSPACE/src-overlay/conf/files.compat_mach" >> /usr/src/sys/conf/files
          # COMPAT_MACH_C: extra flags for compat/mach/*.c. -Wno-error mirrors
          # the out-of-tree kmod's WERROR= (the in-kernel build defaults to
          # -Werror); -DCOMPAT_MACH is omitted (opt_compat_mach.h provides it).
          # $S stays literal (single quotes) — it expands in the kernel Makefile.
          printf '\n# mach compat subsystem (options COMPAT_MACH, nextbsd#181)\n' >> /usr/src/sys/conf/kern.pre.mk
          printf 'COMPAT_MACH_C= -DMACH_INTERNAL= -DAUDIT -I$S/apple -include $S/compat/mach/compat_shim.h -Wno-error\n' >> /usr/src/sys/conf/kern.pre.mk
          grep -q '^options[[:space:]]*COMPAT_MACH' \
            /usr/src/sys/${{ matrix.target }}/conf/NEXTBSD || \
            printf 'options\tCOMPAT_MACH\n' >> /usr/src/sys/${{ matrix.target }}/conf/NEXTBSD
          echo "==> mach wired in; compat/mach .c files: $(grep -c 'optional compat_mach' /usr/src/sys/conf/files)"

      - name: Build kernel (no modules)
        run: |
          cd /usr/src
          # Point --cross-bindir at the ccache wrapper (clang/clang++ -> ccache)
          # so kernel compiles are cached. MAKEOBJDIRPREFIX + CCACHE_CROSS_BINDIR
          # are inherited from the toolchain image ENV.
          ./tools/build/make.py \
            --cross-bindir="${CCACHE_CROSS_BINDIR}" \
            TARGET="${{ matrix.target }}" \
            TARGET_ARCH="${{ matrix.target_arch }}" \
            KERNCONF=NEXTBSD \
            NO_MODULES=yes \
            buildkernel -j"$(nproc)"

      - name: ccache stats (after build — hit rate is the proof)
        run: ccache -s

      # Tar the obj tree IN-CONTAINER, where /usr/obj perms are intact. The
      # exec bit (bmake, cross-tools) survives inside the tar stream; a raw
      # upload-artifact tree comes back 0644 and breaks make.py's bmake
      # bootstrap downstream (PermissionError on /usr/obj/bmake-install/bin/bmake).
      - name: Package obj tree (preserves exec bits)
        run: |
          # Full /usr/obj — consumed by nextbsd-kernel-modules.
          tar -czf "/tmp/kernel-obj-${{ matrix.target }}.tar.gz" -C /usr/obj .
          # sys/NEXTBSD subtree (kernel binary + opt_*.h) — consumed by nextbsd.
          SUB=$(cd /usr/obj && find . -type d -path '*sys/NEXTBSD' | head -1)
          echo "sys/NEXTBSD subtree: ${SUB:-<not found>}"
          test -n "$SUB"
          tar -czf "/tmp/nextbsd-kernel-${{ matrix.target }}.tar.gz" -C /usr/obj "$SUB"
          ls -lh /tmp/kernel-obj-${{ matrix.target }}.tar.gz /tmp/nextbsd-kernel-${{ matrix.target }}.tar.gz

      # Artifacts are now single .tar.gz files (already gzip'd → store-only).
      # Their CONTENTS carry the perms, so the round-trip through artifacts +
      # the continuous release no longer strips the exec bit.
      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextbsd-kernel-${{ matrix.target }}
          path: /tmp/nextbsd-kernel-${{ matrix.target }}.tar.gz
          compression-level: 0

      - name: Upload obj tree for modules
        uses: actions/upload-artifact@v4
        with:
          name: kernel-obj-${{ matrix.target }}
          path: /tmp/kernel-obj-${{ matrix.target }}.tar.gz
          compression-level: 0

  # PR-only boot smoke test: drop THIS PR's kernel into the latest published
  # NextBSD ISO (nextbsd `continuous`) and boot it, so we catch a patch/config
  # change that breaks boot before it merges. We pin production releng/15.0, so
  # KBI is stable and the ISO's shipped mach.ko + modules keep loading against a
  # freshly-built kernel — only the kernel binary is swapped.
  #
  # Deliberately scoped: runs ONLY on pull_request, never on main/dispatch, and
  # does NOT gate `publish` or the downstream cascade. amd64 only (no arm64 ISO
  # exists to boot yet).
  smoke-test:
    name: smoke-test (boot the continuous ISO with this kernel)
    needs: kernel
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      # The image (~2G raw) + a FreeBSD VM + qemu need headroom.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      # This run's freshly-built kernel (the tarball preserves the exec bit).
      - name: Download this run's NEXTBSD kernel
        uses: actions/download-artifact@v4
        with:
          name: nextbsd-kernel-amd64
          path: kernel-dl

      - name: Extract kernel binary
        run: |
          tar -C kernel-dl -xzf kernel-dl/nextbsd-kernel-amd64.tar.gz
          KERNEL=$(find kernel-dl -type f -name kernel -path '*NEXTBSD*' | head -1)
          test -n "$KERNEL" || { echo "no NEXTBSD kernel binary in artifact" >&2; exit 1; }
          ls -lh "$KERNEL"

      # Latest CI-gated NextBSD ISO. Unzip to a raw disk.img we can md-mount.
      - name: Download nextbsd continuous ISO
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh release download continuous -R nextbsd-redux/nextbsd \
            --pattern '*.img.zip' --dir iso --clobber
          MEMBER=$(unzip -Z1 iso/*.img.zip | grep -E '\.img$' | head -1)
          [ -n "$MEMBER" ] || { echo "no .img member in published zip" >&2; exit 1; }
          unzip -p iso/*.img.zip "$MEMBER" > disk.img
          rm -rf iso
          ls -lh disk.img

      # The root is freebsd-ufs (not writable from Linux), so swap the kernel
      # inside a FreeBSD VM: md-attach the image, mount the ROOTFS partition,
      # replace /boot/kernel/kernel, unmount. copyback brings disk.img back.
      - name: Inject this kernel into the ISO's UFS root
        uses: vmactions/freebsd-vm@v1
        with:
          release: '15.0'
          usesh: true
          sync: rsync
          copyback: true
          run: |
            set -eu
            KERNEL=$(find kernel-dl -type f -name kernel -path '*NEXTBSD*' | head -1)
            echo "==> injecting $KERNEL"
            md=$(mdconfig -a -t vnode -f disk.img)
            echo "    md device: $md"
            gpart show -p "$md"
            part=$(gpart show -p "$md" | awk '/freebsd-ufs/{print $3; exit}')
            [ -n "$part" ] || { echo "no freebsd-ufs partition" >&2; exit 1; }
            echo "    ufs partition: /dev/$part"
            mkdir -p /mnt-root
            mount "/dev/$part" /mnt-root
            echo "    before: $(ls -l /mnt-root/boot/kernel/kernel)"
            cp "$KERNEL" /mnt-root/boot/kernel/kernel
            chmod 555 /mnt-root/boot/kernel/kernel
            echo "    after:  $(ls -l /mnt-root/boot/kernel/kernel)"
            umount /mnt-root
            mdconfig -d -u "$md"
            echo "==> kernel injected"

      - name: Install qemu + expect + OVMF
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 expect ovmf

      # Reuse nextbsd's canonical boot test verbatim (the on-image
      # /usr/tests/.../run.sh marker suite drives the actual assertions), so the
      # kernel is exercised "the same way" the ISO is. Fetched from nextbsd main
      # to stay in sync.
      - name: Fetch nextbsd boot test
        run: |
          mkdir -p tests
          curl -fsSL https://raw.githubusercontent.com/nextbsd-redux/nextbsd/main/tests/boot-test.sh \
            -o tests/boot-test.sh
          chmod +x tests/boot-test.sh

      - name: Boot test (this kernel in the continuous ISO)
        run: ./tests/boot-test.sh disk.img

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log
          path: tests/boot.log
          if-no-files-found: ignore

  # Refresh the rolling `continuous` release from a successful main build, so
  # downstream consumers ingest a stable, always-present pointer instead of
  # scraping "latest successful main run" artifacts (which expire and aren't
  # gated). PRs build (the job above) but never reach here — see the `if`.
  # Single non-matrix job (not a per-arch step) so the two legs don't race on
  # release creation; it collects both arches' artifacts and publishes once.
  publish:
    name: publish continuous
    needs: kernel
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # The build job already produced perms-correct .tar.gz files (one per
      # artifact); just gather them. No re-tar — re-taring the extracted tree
      # is exactly what stripped the exec bit before.
      - name: Collect per-arch assets
        run: |
          mkdir -p out
          find artifacts -name 'kernel-obj-*.tar.gz' -exec cp {} out/ \;
          find artifacts -name 'nextbsd-kernel-*.tar.gz' -exec cp {} out/ \;
          ls -lh out/

      # Stable asset names (no datestamp) → each publish overwrites in place, so
      # the release never accumulates stale assets and needs no delete step.
      - name: Publish to continuous release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous kernel build
          body: |
            Rolling kernel build, refreshed on every successful `main` build.
            Consumed by nextbsd-kernel-modules (`kernel-obj-<arch>.tar.gz`) and
            nextbsd (`nextbsd-kernel-<arch>.tar.gz`).

            Build log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit: ${{ github.sha }}
          prerelease: true
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: |
            out/*.tar.gz

      # Cascade to modules only on a real source/toolchain change
      # (repository_dispatch), and only AFTER continuous is refreshed above —
      # so the module build ingests this run's obj tree, not the prior one.
      # No run_id needed anymore: modules pulls kernel's continuous release.
      - name: Trigger module build
        if: github.event_name == 'repository_dispatch'
        run: |
          gh api repos/nextbsd-redux/nextbsd-kernel-modules/dispatches \
            -f event_type=kernel-updated \
            -f "client_payload[fbsd_sha]=${{ github.event.client_payload.fbsd_sha }}" \
            -f "client_payload[sha]=${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
