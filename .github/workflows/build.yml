name: Build NextBSD Kernel
on:
  repository_dispatch:
    types: [toolchain-updated]
  push:
    paths: ['patches/**', 'config/**']
  pull_request:
    # Validate the kernel build on PRs touching patches/config/workflow. PR
    # runs never cascade — the module-build trigger is gated on
    # github.event_name == 'repository_dispatch', which a pull_request is not.
    paths: ['patches/**', 'config/**', '.github/workflows/build.yml']
  workflow_dispatch:

env:
  FREEBSD_BRANCH: releng/15.0

jobs:
  kernel:
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: amd64
            target_arch: amd64
          - target: arm64
            target_arch: aarch64
    container:
      # Per-arch toolchain image. repository_dispatch carries fbsd_sha (the
      # pinned source commit) -> :<arch>-fbsd-<sha>; a patch-only push or manual
      # run has no sha and falls back to :<arch>-latest. Both arches cross-build
      # on the x86_64 runner (clang cross-compiles; no emulation).
      image: ghcr.io/nextbsd-redux/nextbsd-kernel-toolchain:${{ matrix.target }}-${{ github.event.client_payload.fbsd_sha && format('fbsd-{0}', github.event.client_payload.fbsd_sha) || 'latest' }}
    steps:
      - uses: actions/checkout@v4

      # ccache: persist CCACHE_DIR across runs so an unchanged/1-file rebuild
      # hits the cache. ccache itself is in the toolchain image; we point
      # --cross-bindir at the image's CCACHE_CROSS_BINDIR wrapper below.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-kernel-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            ccache-kernel-${{ matrix.target }}-

      - name: ccache reset counters
        run: |
          ccache -o max_size=3G
          ccache -z
          ccache -s

      - name: Apply patches
        run: |
          cd /usr/src
          for p in $(cat "$GITHUB_WORKSPACE/patches/series"); do
            echo "Applying $p"
            git apply "$GITHUB_WORKSPACE/patches/$p"
          done

      - name: Copy kernel config
        run: cp "$GITHUB_WORKSPACE/config/NEXTBSD" /usr/src/sys/${{ matrix.target }}/conf/

      - name: Build kernel (no modules)
        run: |
          cd /usr/src
          # Point --cross-bindir at the ccache wrapper (clang/clang++ -> ccache)
          # so kernel compiles are cached. MAKEOBJDIRPREFIX + CCACHE_CROSS_BINDIR
          # are inherited from the toolchain image ENV.
          ./tools/build/make.py \
            --cross-bindir="${CCACHE_CROSS_BINDIR}" \
            TARGET="${{ matrix.target }}" \
            TARGET_ARCH="${{ matrix.target_arch }}" \
            KERNCONF=NEXTBSD \
            NO_MODULES=yes \
            buildkernel -j"$(nproc)"

      - name: ccache stats (after build — hit rate is the proof)
        run: ccache -s

      # Tar the obj tree IN-CONTAINER, where /usr/obj perms are intact. The
      # exec bit (bmake, cross-tools) survives inside the tar stream; a raw
      # upload-artifact tree comes back 0644 and breaks make.py's bmake
      # bootstrap downstream (PermissionError on /usr/obj/bmake-install/bin/bmake).
      - name: Package obj tree (preserves exec bits)
        run: |
          # Full /usr/obj — consumed by nextbsd-kernel-modules.
          tar -czf "/tmp/kernel-obj-${{ matrix.target }}.tar.gz" -C /usr/obj .
          # sys/NEXTBSD subtree (kernel binary + opt_*.h) — consumed by nextbsd.
          SUB=$(cd /usr/obj && find . -type d -path '*sys/NEXTBSD' | head -1)
          echo "sys/NEXTBSD subtree: ${SUB:-<not found>}"
          test -n "$SUB"
          tar -czf "/tmp/nextbsd-kernel-${{ matrix.target }}.tar.gz" -C /usr/obj "$SUB"
          ls -lh /tmp/kernel-obj-${{ matrix.target }}.tar.gz /tmp/nextbsd-kernel-${{ matrix.target }}.tar.gz

      # Artifacts are now single .tar.gz files (already gzip'd → store-only).
      # Their CONTENTS carry the perms, so the round-trip through artifacts +
      # the continuous release no longer strips the exec bit.
      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextbsd-kernel-${{ matrix.target }}
          path: /tmp/nextbsd-kernel-${{ matrix.target }}.tar.gz
          compression-level: 0

      - name: Upload obj tree for modules
        uses: actions/upload-artifact@v4
        with:
          name: kernel-obj-${{ matrix.target }}
          path: /tmp/kernel-obj-${{ matrix.target }}.tar.gz
          compression-level: 0

  # Refresh the rolling `continuous` release from a successful main build, so
  # downstream consumers ingest a stable, always-present pointer instead of
  # scraping "latest successful main run" artifacts (which expire and aren't
  # gated). PRs build (the job above) but never reach here — see the `if`.
  # Single non-matrix job (not a per-arch step) so the two legs don't race on
  # release creation; it collects both arches' artifacts and publishes once.
  publish:
    name: publish continuous
    needs: kernel
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # The build job already produced perms-correct .tar.gz files (one per
      # artifact); just gather them. No re-tar — re-taring the extracted tree
      # is exactly what stripped the exec bit before.
      - name: Collect per-arch assets
        run: |
          mkdir -p out
          find artifacts -name 'kernel-obj-*.tar.gz' -exec cp {} out/ \;
          find artifacts -name 'nextbsd-kernel-*.tar.gz' -exec cp {} out/ \;
          ls -lh out/

      # Stable asset names (no datestamp) → each publish overwrites in place, so
      # the release never accumulates stale assets and needs no delete step.
      - name: Publish to continuous release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous kernel build
          body: |
            Rolling kernel build, refreshed on every successful `main` build.
            Consumed by nextbsd-kernel-modules (`kernel-obj-<arch>.tar.gz`) and
            nextbsd (`nextbsd-kernel-<arch>.tar.gz`).

            Build log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit: ${{ github.sha }}
          prerelease: true
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: |
            out/*.tar.gz

      # Cascade to modules only on a real source/toolchain change
      # (repository_dispatch), and only AFTER continuous is refreshed above —
      # so the module build ingests this run's obj tree, not the prior one.
      # No run_id needed anymore: modules pulls kernel's continuous release.
      - name: Trigger module build
        if: github.event_name == 'repository_dispatch'
        run: |
          gh api repos/nextbsd-redux/nextbsd-kernel-modules/dispatches \
            -f event_type=kernel-updated \
            -f "client_payload[fbsd_sha]=${{ github.event.client_payload.fbsd_sha }}" \
            -f "client_payload[sha]=${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
